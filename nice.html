<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Friendship Tree 🌸</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #11091c;
            min-height: 100vh;
            overflow: hidden;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .aura {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(181, 23, 158, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Fixed container that prevents desktop collapse and scales dynamically on mobile */
        .garden-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 25px;
            z-index: 5;
        }

        /* Top Header Instruction */
        .header-instruction {
            color: #dcbfff;
            font-size: 16px;
            text-align: center;
            text-shadow: 0 0 10px rgba(181, 23, 158, 0.5);
            font-weight: 500;
            flex-shrink: 0;
        }

        /* Center Tree Engine Area */
        .tree-space-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        .tree-trunk {
            position: relative;
            width: 22px;
            height: 220px;
            background: linear-gradient(to top, #2b113a, #4a1c5d);
            border-radius: 12px 12px 0 0;
            box-shadow: 0 0 20px rgba(181, 23, 158, 0.3);
            margin-top: 20px;
        }

        .branch {
            position: absolute;
            background: #4a1c5d;
            border-radius: 10px;
            transform-origin: bottom center;
        }
        .branch.left {
            width: 10px;
            height: 90px;
            top: 50px;
            left: -4px;
            transform: rotate(-45deg);
        }
        .branch.right {
            width: 10px;
            height: 90px;
            top: 85px;
            left: 16px;
            transform: rotate(45deg);
        }
        .branch.center {
            width: 8px;
            height: 70px;
            top: -55px;
            left: 7px;
            transform: rotate(10deg);
        }

        .lantern {
            position: absolute;
            width: 54px;
            height: 68px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: floatSwing var(--swingspeed) ease-in-out infinite alternate;
        }

        @keyframes floatSwing {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-12px) rotate(5deg); }
        }

        .lantern.lit-pink {
            background: rgba(255, 71, 126, 0.9) !important;
            border-color: #ff758f !important;
            box-shadow: 0 0 25px #ff477e, 0 0 50px rgba(255, 71, 126, 0.5) !important;
            transform: scale(1.1);
        }

        .lantern.lit-purple {
            background: rgba(181, 23, 158, 0.9) !important;
            border-color: #d64cdb !important;
            box-shadow: 0 0 25px #b5179e, 0 0 50px rgba(181, 23, 158, 0.5) !important;
            transform: scale(1.1);
        }

        /* Full Screen Reading Mode Pages Overlay */
        .message-page-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 5, 18, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .message-page-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .content-card {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transform: translateY(40px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }

        .message-page-overlay.active .content-card {
            transform: translateY(0);
        }

        .content-card h2 {
            font-size: 21px;
            margin-bottom: 16px;
            background: linear-gradient(45deg, #ff477e, #b5179e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content-card p {
            color: #f3e8ff;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* Okay Navigation Button */
        .okay-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .okay-btn:active {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(0.97);
        }

        /* Bottom Row Wrapper for Bloom Action Trigger */
        .bottom-action-wrapper {
            width: 100%;
            max-width: 400px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .bloom-trigger-btn {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff477e 0%, #b5179e 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(181, 23, 158, 0.5);
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bloom-trigger-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            animation: pulseBtn 2s infinite;
        }

        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 25px rgba(181, 23, 158, 0.5); }
            50% { transform: scale(1.03); box-shadow: 0 12px 30px rgba(255, 71, 126, 0.7); }
        }

        .canopy-bloom {
            position: absolute;
            top: -130px;
            left: -115px;
            width: 250px;
            height: 210px;
            background: radial-gradient(circle, rgba(255,71,126,0.85) 0%, rgba(181,23,158,0.7) 60%, rgba(0,0,0,0) 100%);
            filter: blur(16px);
            border-radius: 50%;
            opacity: 0;
            transform: scale(0.5);
            transition: all 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: -1;
        }

        .canopy-bloom.bloomed {
            opacity: 1;
            transform: scale(1);
        }

        .glow-sparkle {
            position: absolute;
            pointer-events: none;
            user-select: none;
            z-index: 200;
            text-shadow: 0 0 10px rgba(255, 255, 255, 1);
            animation: ascend var(--duration) linear forwards;
        }

        @keyframes ascend {
            0% { transform: translate(0, 0) scale(0.3) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(var(--drift), -105vh) scale(var(--targetscale)) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="aura"></div>

    <!-- MAIN GARDEN GRAPHICS WINDOW -->
    <div class="garden-container" id="main-view">
        
        <div class="header-instruction" id="main-title">
            Tap the 3 floating memory lanterns... ✨
        </div>

        <div class="tree-space-wrapper">
            <div class="tree-trunk">
                <div class="canopy-bloom" id="canopy"></div>
                
                <div class="branch left">
                    <div class="lantern" id="lantern1" style="bottom: 65px; left: -27px; --swingspeed: 2.3s;" onclick="openMessagePage(1, 'pink', this)">🏮</div>
                </div>
                
                <div class="branch right">
                    <div class="lantern" id="lantern2" style="bottom: 65px; right: -27px; --swingspeed: 1.8s;" onclick="openMessagePage(2, 'purple', this)">🏮</div>
                </div>
                
                <div class="branch center">
                    <div class="lantern" id="lantern3" style="bottom: 50px; left: -16px; --swingspeed: 2.1s;" onclick="openMessagePage(3, 'pink', this)">🏮</div>
                </div>
            </div>
        </div>

        <div class="bottom-action-wrapper">
            <button class="bloom-trigger-btn" id="bloom-btn" onclick="triggerBlossomBloom()">Bring the Garden to Life ✨</button>
        </div>

    </div>

    <!-- CLEAN INTERSTITIAL MODAL CONTAINER PAGE -->
    <div class="message-page-overlay" id="overlay-page">
        <div class="content-card">
            <h2 id="card-title">Lantern</h2>
            <p id="card-text">Message goes here...</p>
            <button class="okay-btn" onclick="closeMessagePage()">Okay</button>
        </div>
    </div>

    <script>
        let litCount = 0;
        const trackingList = { 1: false, 2: false, 3: false };

        const insights = [
            "I feel terrible about the misunderstanding in the group chat earlier. We were laughing purely at how broken and chaotic the automatic Hindi translation got—never ever at you directly.",
            "I truly value your presence and our conversations. I'd never want to cause real discomfort or make you feel sidelined. Your friendship is incredibly important to me.",
            "Thank you for taking the time to open these. I promise to be a lot more thoughtful moving forward. Let's clear the air completely! Salamat for being awesome! 🇵🇭🇮🇳"
        ];

        const titles = [
            "Lantern of Truth 🌸",
            "Lantern of Value 🔮",
            "Lantern of Peace 💝"
        ];

        // Safe Audio initialization prevents code block freezes on local files or EMUI browsers
        let audioCtx = null;
        function playChime(frequency) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.10, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.7);
            } catch (e) {
                console.log("Audio parameters skipped cleanly to keep clicks active.");
            }
        }

        function createSparkles(startX, startY, rawCount, elementsArray) {
            for (let i = 0; i < rawCount; i++) {
                const sp = document.createElement('div');
                sp.classList.add('glow-sparkle');
                sp.innerText = elementsArray[Math.floor(Math.random() * elementsArray.length)];
                sp.style.left = `${startX}px`;
                sp.style.top = `${startY}px`;
                sp.style.setProperty('--drift', `${Math.random() * 260 - 130}px`);
                sp.style.setProperty('--duration', `${Math.random() * 2 + 2}s`);
                sp.style.setProperty('--targetscale', Math.random() * 1.1 + 0.6);
                sp.style.fontSize = `${Math.random() * 8 + 18}px`;
                document.body.appendChild(sp);
                setTimeout(() => sp.remove(), 4000);
            }
        }

        function openMessagePage(id, visualStyle, element) {
            document.getElementById('card-title').innerText = titles[id - 1];
            document.getElementById('card-text').innerText = insights[id - 1];
            
            document.getElementById('overlay-page').classList.add('active');
            playChime(420);

            if (!trackingList[id]) {
                trackingList[id] = true;
                litCount++;
                element.innerText = "✨";
                element.classList.add(`lit-${visualStyle}`);
                
                const rect = element.getBoundingClientRect();
                createSparkles(rect.left + 22, rect.top + 18, 10, ['✨', '🌸', '🔮']);
            }
        }

        function closeMessagePage() {
            document.getElementById('overlay-page').classList.remove('active');
            playChime(580);

            if (litCount === 3) {
                setTimeout(() => {
                    document.getElementById('bloom-btn').classList.add('visible');
                    document.getElementById('main-title').innerText = "The lanterns are shining bright! ✨";
                }, 350);
            }
        }

        function triggerBlossomBloom() {
            playChime(784);
            
            document.getElementById('canopy').classList.add('bloomed');
            document.getElementById('bloom-btn').classList.remove('visible');
            document.getElementById('main-title').innerHTML = "The Garden Has Bloomed! 🌸✨";

            setInterval(() => {
                createSparkles(Math.random() * window.innerWidth, window.innerHeight + 10, 1, ['💖', '💜', '🌸', '✨', '💕', '🔮']);
            }, 130);
        }
    </script>
</body>
</html>
